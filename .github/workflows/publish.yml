name: Publish

on:
  push:
    tags:
      - 'v*.*.*'

jobs:
  unit:
    name: Unit Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 9

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install

      - name: Run unit tests
        run: pnpm test:unit

  integration:
    name: Integration Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 9

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install

      - name: Run integration tests
        run: pnpm test:integration

  e2e:
    name: E2E Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 9

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install

      - name: Install Playwright browsers
        run: pnpm exec playwright install --with-deps chromium

      - name: Build core
        run: pnpm --filter @bldmrk/core build

      - name: Build CLI
        run: pnpm --filter @bldmrk/cli build

      - name: Build admin and theme
        run: pnpm build:admin && pnpm build:theme

      - name: Run E2E tests
        run: pnpm test:e2e

  build-and-publish:
    name: Build & Publish
    runs-on: ubuntu-latest
    needs: [unit, integration, e2e]
    steps:
      - run: echo "placeholder"

  release:
    name: GitHub Release
    runs-on: ubuntu-latest
    needs: [build-and-publish]
    steps:
      - run: echo "placeholder"
