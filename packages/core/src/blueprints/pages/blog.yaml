name: blog
label: Blog Post
extends: default

tabs:
  - id: content
    label: Content
    fields:
      - name: _content
        type: markdown
        label: Post Content

  - id: meta
    label: Metadata
    fields:
      - name: title
        type: text
        label: Title
        required: true
      - name: slug
        type: slug
        label: URL Slug
        source: title
      - name: published
        type: boolean
        label: Published
        default: true
      - name: date
        type: datetime
        label: Publish Date
        required: true
      - name: author
        type: text
        label: Author
      - name: description
        type: textarea
        label: Excerpt
        help: Short summary shown in blog listings
      - name: tags
        type: tags
        label: Tags
      - name: hero_image
        type: image
        label: Hero Image

  - id: seo
    label: SEO
    fields:
      - name: meta.title
        type: text
        label: SEO Title
        placeholder: Defaults to post title if empty
      - name: meta.description
        type: textarea
        label: Meta Description
      - name: meta.image
        type: image
        label: Social Image
